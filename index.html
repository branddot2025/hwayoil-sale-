  <!DOCTYPE html>                              
  <html lang="ko">                                                                                                                 
  <head>                                       
    <meta charset="UTF-8" />                                                                                                       
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />                                                       
    <title>hwayoil.com — 도메인 판매</title>                                                                                       
    <style>          
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');                          
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }                                                    
      body { font-family: 'Noto Sans KR', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex;          
  align-items: center; justify-content: center; }                                                                                  
      .container { text-align: center; padding: 40px 24px; max-width: 640px; width: 100%; }                                        
      .badge { display: inline-block; background: #ff4e00; color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; 
  text-transform: uppercase; padding: 6px 16px; border-radius: 999px; margin-bottom: 36px; }                                       
      .headline { font-size: clamp(28px, 6vw, 48px); font-weight: 900; line-height: 1.25; margin-bottom: 48px; color: #fff; }      
      .domains { display: flex; flex-direction: column; gap: 16px; margin-bottom: 48px; }                                          
      .domain-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 16px; padding: 28px 32px; display: flex;       
  align-items: center; justify-content: space-between; gap: 16px; transition: border-color 0.2s; }                                 
      .domain-card:hover { border-color: #ff4e00; }                                                                                
      .domain-name { font-size: clamp(20px, 4vw, 28px); font-weight: 700; letter-spacing: -0.02em; color: #fff; }                  
      .domain-tld { color: #ff4e00; }                                                                                              
      .domain-tag { font-size: 12px; color: #888; background: #222; padding: 4px 12px; border-radius: 999px; white-space: nowrap; }
      .divider { width: 40px; height: 2px; background: #2a2a2a; margin: 0 auto 48px; border-radius: 999px; }                       
      .contact-label { font-size: 13px; color: #666; margin-bottom: 16px; letter-spacing: 0.05em; }                                
      .email-btn { display: inline-block; background: #ff4e00; color: #fff; text-decoration: none; font-size: 16px; font-weight:   
  700; padding: 16px 36px; border-radius: 12px; transition: background 0.2s, transform 0.15s; }                                    
      .email-btn:hover { background: #e64400; transform: translateY(-2px); }                                                       
      .email-text { display: block; margin-top: 16px; font-size: 13px; color: #555; }                                              
    </style>                                   
  </head>                                                                                                                          
  <body>                                                                                                                           
    <div class="container">                    
      <div class="badge">For Sale</div>                                                                                            
      <h1 class="headline">이 도메인을<br>판매합니다</h1>
      <div class="domains">                                                                                                        
        <div class="domain-card">
          <span class="domain-name">hwayoil<span class="domain-tld">.com</span></span>                                             
          <span class="domain-tag">글로벌</span>                                                                                   
        </div>      
      </div>                                                                                                                       
      <div class="divider"></div>              
      <p class="contact-label">문의하기</p>
      <a class="email-btn" href="mailto:thehwayoil@naver.com?subject=hwayoil.com 도메인 구매 문의">이메일로 연락하기</a>           
      <span class="email-text">thehwayoil@naver.com</span>                                                                         
    </div>                                                                                                                         
  </body>                                                                                                                          
  </html>
